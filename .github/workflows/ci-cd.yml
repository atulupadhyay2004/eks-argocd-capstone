name: Capstone CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: atulupadhyay002/eks-argocd-capstone
  GITOPS_REPO: atulupadhyay2004/eks-argocd-capstone-gitops

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  update-gitops:
    name: Update GitOps Repo
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Update image tag in GitOps repo
        run: |
          git config --global user.email "gitops@capstone.com"
          git config --global user.name "GitOps Bot"

          git clone \
            https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ env.GITOPS_REPO }}.git \
            gitops-repo

          cd gitops-repo

          sed -i "s|tag: .*|tag: \"${{ github.sha }}\"|" \
            helm/capstone-app/values.yaml

          git add .
          git commit -m "Update image tag to ${{ github.sha }}"
          git push

          echo "✅ GitOps repo updated with new image tag"

  verify:
    name: Verify Pipeline
    runs-on: ubuntu-latest
    needs: update-gitops

    steps:
      - name: Pipeline Summary
        run: |
          echo "========================================="
          echo "✅ Capstone Pipeline Complete"
          echo "========================================="
          echo "Tests: Passed"
          echo "Image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          echo "GitOps: Updated"
          echo "ArgoCD: Will sync within 3 minutes"
          echo "========================================="
